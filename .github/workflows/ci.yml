name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rspec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run test suite
        run: bundle exec rspec

  ats-e2e:
    runs-on: ubuntu-latest
    needs: rspec
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUN_E2E: "1"
      PGHOST: "127.0.0.1"
      PGUSER: "postgres"
      PGPASSWORD: "postgres"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client libs
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libpq-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Rails CLI
        run: gem install rails --no-document

      - name: Run ATS e2e spec
        run: bundle exec rspec spec/e2e/ats_generation_spec.rb
